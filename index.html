<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Pro Tracker - Professional Edition</title>
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; color: var(--dark); margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .import-section { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #ccc; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .court-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .court { border-top: 8px solid var(--primary); background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .court.blue { border-top-color: var(--secondary); }
        .match-box { background: #f0f2f5; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: center; }
        .score-input { width: 55px; padding: 8px; text-align: center; font-size: 1.2em; font-weight: bold; border-radius: 6px; border: 1px solid #ccc; }
        .edit-panel { display: none; background: #fffbe6; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #ffe58f; }
        .edit-panel select { width: 100%; padding: 5px; margin: 3px 0; border-radius: 4px; font-size: 0.9em; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; flex: 1; }
        .btn-save { background: var(--primary); color: white; }
        .btn-shuffle { background: #f39c12; color: white; }
        .btn-edit { background: #95a5a6; color: white; }
        .btn-import { background: var(--dark); color: white; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--dark); color: white; }
        
        /* Warna Leaderboard */
        .bg-pria { background-color: #d1ecf1 !important; }
        .bg-wanita { background-color: #f8d7da !important; }
        
        .badge { font-size: 0.75em; color: #666; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pickleball Matchmaker</h1>

    <div class="import-section" id="setupSection">
        <h3>1. Input Daftar Nama</h3>
        <textarea id="rawNames" placeholder="Contoh: Budi, Siti cewe, Andi, Maya cewe..."></textarea>
        <button class="btn-import" onclick="setupGame()">Mulai Sesi Main</button>
    </div>

    <div id="mainGame" style="display:none;">
        <div class="court-container">
            <div class="court">
                <h2>Court 1: Mix Double</h2>
                <div class="match-box">
                    <div id="display-xd"></div>
                    
                    <div id="edit-xd" class="edit-panel">
                        <div style="font-size: 0.8em; font-weight: bold; margin-bottom: 5px;">Tim 1</div>
                        <select id="sel-xd-0"></select> (Wanita)
                        <select id="sel-xd-1"></select> (Pria)
                        <div style="margin: 10px 0; font-size: 0.8em; color: red;">VS</div>
                        <div style="font-size: 0.8em; font-weight: bold; margin-bottom: 5px;">Tim 2</div>
                        <select id="sel-xd-2"></select> (Wanita)
                        <select id="sel-xd-3"></select> (Pria)
                        <button onclick="applyEdit('xd')" style="background:var(--primary); color:white; width:100%; margin-top:10px;">Terapkan Perubahan</button>
                    </div>

                    <div style="margin: 15px 0;">
                        <input type="number" id="sc-xd-1" class="score-input" placeholder="0"> : 
                        <input type="number" id="sc-xd-2" class="score-input" placeholder="0">
                    </div>
                    <div class="btn-group">
                        <button class="btn-save" onclick="finishMatch('xd')">Simpan</button>
                        <button class="btn-shuffle" onclick="shuffleQueue('xd')">Acak</button>
                        <button class="btn-edit" onclick="toggleEdit('xd')">Edit</button>
                    </div>
                </div>
            </div>

            <div class="court blue">
                <h2>Court 2: Men Double</h2>
                <div class="match-box">
                    <div id="display-pa"></div>
                    <div id="edit-pa" class="edit-panel">
                        <select id="sel-pa-0"></select> & <select id="sel-pa-1"></select>
                        <div style="margin: 10px 0; color: #3498db;">VS</div>
                        <select id="sel-pa-2"></select> & <select id="sel-pa-3"></select>
                        <button onclick="applyEdit('pa')" style="background:var(--primary); color:white; width:100%; margin-top:10px;">Terapkan Perubahan</button>
                    </div>
                    <div style="margin: 15px 0;">
                        <input type="number" id="sc-pa-1" class="score-input" placeholder="0"> : 
                        <input type="number" id="sc-pa-2" class="score-input" placeholder="0">
                    </div>
                    <div class="btn-group">
                        <button class="btn-save" onclick="finishMatch('pa')">Simpan</button>
                        <button class="btn-shuffle" onclick="shuffleQueue('pa')">Acak</button>
                        <button class="btn-edit" onclick="toggleEdit('pa')">Edit</button>
                    </div>
                </div>
            </div>
        </div>

        <h3>Leaderboard</h3>
        <table>
            <thead><tr><th>Nama Pemain</th><th>Sesi Main</th><th>Total Poin</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<script>
    let players = {}; 
    let queueXD = [];
    let queuePA = [];
    let currentMatch = { xd: [[], []], pa: [[], []] };

    function setupGame() {
        const text = document.getElementById('rawNames').value;
        if (!text.trim()) return;
        const names = text.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
        
        let cewe = []; let cowo = [];
        names.forEach(n => {
            let isCewe = n.toLowerCase().includes('cewe');
            let cleanName = n.replace(/cewe/i, '').trim();
            players[cleanName] = { name: cleanName, gender: isCewe ? 'Wanita' : 'Pria', played: 0, points: 0 };
            if (isCewe) cewe.push(cleanName); else cowo.push(cleanName);
        });

        cowo.sort(() => Math.random() - 0.5);
        let cowoForXD = cowo.splice(0, cewe.length);
        cewe.forEach((c, i) => queueXD.push([c, cowoForXD[i]]));
        for(let i=0; i < cowo.length; i+=2) { if(cowo[i+1]) queuePA.push([cowo[i], cowo[i+1]]); }

        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('mainGame').style.display = 'block';
        nextMatch('xd'); nextMatch('pa');
        updateLeaderboard();
    }

    function toggleEdit(court) {
        const panel = document.getElementById(`edit-${court}`);
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        if(panel.style.display === 'block') populateSelectors(court);
    }

    function populateSelectors(court) {
        const allNames = Object.keys(players).sort();
        const ceweNames = allNames.filter(n => players[n].gender === 'Wanita');
        const cowoNames = allNames.filter(n => players[n].gender === 'Pria');

        for(let i=0; i<4; i++) {
            const sel = document.getElementById(`sel-${court}-${i}`);
            let options = "";
            if (court === 'xd') {
                let targetList = (i % 2 === 0) ? ceweNames : cowoNames;
                options = targetList.map(name => `<option value="${name}" ${currentMatch[court].flat()[i] === name ? 'selected' : ''}>${name}</option>`).join('');
            } else {
                options = cowoNames.map(name => `<option value="${name}" ${currentMatch[court].flat()[i] === name ? 'selected' : ''}>${name}</option>`).join('');
            }
            sel.innerHTML = options;
        }
    }

    function applyEdit(court) {
        const p0 = document.getElementById(`sel-${court}-0`).value;
        const p1 = document.getElementById(`sel-${court}-1`).value;
        const p2 = document.getElementById(`sel-${court}-2`).value;
        const p3 = document.getElementById(`sel-${court}-3`).value;
        currentMatch[court] = [[p0, p1], [p2, p3]];
        updateDisplay(court);
        toggleEdit(court);
    }

    function nextMatch(court) {
        let q = court === 'xd' ? queueXD : queuePA;
        if (q.length >= 2) {
            currentMatch[court] = [q.shift(), q.shift()];
            updateDisplay(court);
        }
    }

    function updateDisplay(court) {
        const [t1, t2] = currentMatch[court];
        document.getElementById(`display-${court}`).innerHTML = `
            <div style="font-weight:bold;">${t1[0]} & ${t1[1]}</div>
            <div style="color:red; font-size:0.8em; margin:2px 0;">VS</div>
            <div style="font-weight:bold;">${t2[0]} & ${t2[1]}</div>
        `;
    }

    function finishMatch(court) {
        const s1 = parseInt(document.getElementById(`sc-${court}-1`).value) || 0;
        const s2 = parseInt(document.getElementById(`sc-${court}-2`).value) || 0;
        const [team1, team2] = currentMatch[court];
        [...team1, ...team2].forEach(p => { players[p].played++; });
        team1.forEach(p => players[p].points += s1);
        team2.forEach(p => players[p].points += s2);
        let q = court === 'xd' ? queueXD : queuePA;
        q.push(team1, team2);
        document.getElementById(`sc-${court}-1`).value = '';
        document.getElementById(`sc-${court}-2`).value = '';
        nextMatch(court);
        updateLeaderboard();
    }

    function shuffleQueue(court) {
        let pool = [...currentMatch[court].flat(), ...(court === 'xd' ? queueXD.flat() : queuePA.flat())];
        pool.sort(() => Math.random() - 0.5);
        let newQ = [];
        if(court === 'xd') {
            let cewe = pool.filter(p => players[p].gender === 'Wanita');
            let cowo = pool.filter(p => players[p].gender === 'Pria');
            cewe.forEach((c, i) => { if(cowo[i]) newQ.push([c, cowo[i]]); });
        } else {
            for(let i=0; i<pool.length; i+=2) { if(pool[i+1]) newQ.push([pool[i], pool[i+1]]); }
        }
        if(court === 'xd') queueXD = newQ; else queuePA = newQ;
        nextMatch(court);
    }

    function updateLeaderboard() {
        const sorted = Object.values(players).sort((a, b) => b.points - a.points);
        document.getElementById('leaderboardBody').innerHTML = sorted.map(p => {
            const rowClass = p.gender === 'Wanita' ? 'bg-wanita' : 'bg-pria';
            return `
                <tr class="${rowClass}">
                    <td>${p.name}</td>
                    <td>${p.played} kali</td>
                    <td><b>${p.points}</b></td>
                </tr>
            `;
        }).join('');
    }
// Fungsi untuk menyimpan data ke memori HP
function simpanKeMemori() {
    const data = {
        players,
        queueXD,
        queuePA,
        currentMatch
    };
    localStorage.setItem('data_pickleball', JSON.stringify(data));
}

// Fungsi untuk memuat data saat aplikasi dibuka
window.onload = function() {
    const dataTersimpan = localStorage.getItem('data_pickleball');
    if (dataTersimpan) {
        const d = JSON.parse(dataTersimpan);
        players = d.players;
        queueXD = d.queueXD;
        queuePA = d.queuePA;
        currentMatch = d.currentMatch;
        
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('mainGame').style.display = 'block';
        updateDisplay('xd');
        updateDisplay('pa');
        updateLeaderboard();
    }
};

// Update fungsi finishMatch kamu agar memanggil simpanKeMemori()
// (Tambahkan baris simpanKeMemori(); di akhir fungsi finishMatch dan applyEdit)
</script>
</body>
</html>
